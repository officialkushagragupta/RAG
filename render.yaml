# Render Blueprint: https://render.com/docs/blueprint-spec
#
# Deploys only the backend -- the frontend (Streamlit) doesn't run on Render;
# it's deployed separately on Streamlit Community Cloud, which is
# purpose-built for it (see README's "Deployment" section).
#
# To use: Render dashboard -> New -> Blueprint -> select this repo. Render
# reads this file and provisions the service below automatically.
services:
  - type: web
    name: rag-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # No healthCheckPath here on purpose: GET /health makes a live call to
    # Gemini (genai.list_models()) to verify credentials, which is fine for a
    # human checking it occasionally but risky as Render's continuous
    # zero-downtime-deploy health signal -- a transient Gemini quota/latency
    # blip could make Render think a healthy deploy is failing and restart
    # it. Omitting this just falls back to a basic "is it listening" check.
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set manually in the Render dashboard -- never commit this
      - key: GEMINI_MODEL_NAME
        value: gemini-3.1-flash-lite
      - key: EMBEDDING_MODEL_NAME
        value: models/gemini-embedding-001
      - key: EMBEDDING_DIMENSION
        value: "768"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        # Tighten this to your actual Streamlit Cloud URL once you have it,
        # e.g. https://your-app.streamlit.app -- see README's "Deployment" section.
        value: "*"
